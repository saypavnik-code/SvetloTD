name: Deploy Svetlogorsk TD to Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          npm ci
          npm install -g free-tex-packer-cli
          pip install Pillow
          
      - name: Run Pipeline Stage 1 - Generate Assets
        run: python scripts/1_generate_art.py
        
      - name: Run Pipeline Stage 2 - Pack Atlas
        run: python scripts/2_pack_atlas.py
        
      - name: Run Pipeline Stage 3 - Build Game (Vite)
        run: npm run build
        
      - name: Run Pipeline Stage 4 - VK Validation
        run: python scripts/3_vk_validator.py
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
