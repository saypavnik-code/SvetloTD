name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - run: npm ci
      
      # Установка инструмента для упаковки текстур
      - run: npm install -g free-tex-packer-cli
      
      # Запуск Python скрипта сборки ассетов
      - run: python scripts/pack_assets.py
      
      # Сборка проекта
      - run: npm run build
      
      # Проверка лимитов для VK
      - run: python scripts/check_vk_limits.py
      
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
        id: deployment
