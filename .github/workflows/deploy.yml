name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Python Dependencies
        run: pip install Pillow
          
      - run: npm ci
      
      # Установка сборщика текстурных атласов
      - run: npm install -g free-tex-packer-cli
      
      # ШАГ 1: Генерируем реальные PNG файлы прямо во время билда в облаке
      - name: Generate Placeholder Graphics
        run: python scripts/generate_placeholders.py
      
      # ШАГ 2: Упаковываем сгенерированные PNG в единый атлас для Phaser
      - name: Pack Textures into Atlas
        run: python scripts/pack_assets.py
      
      # ШАГ 3: Компилируем TypeScript и Vite
      - run: npm run build
      
      # ШАГ 4: Проверяем, что билд не превышает 30 МБ для VK
      - name: Check VK Size Limits
        run: python scripts/check_vk_limits.py
      
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
        id: deployment
